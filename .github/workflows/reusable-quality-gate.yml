name: 品質ゲート

on:
  workflow_call:
    inputs:
      config-path:
        required: false
        type: string
        default: .ai-quality.yml
    secrets: {}

jobs:
  quality:
    name: 品質ゲート
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      checks: write
    steps:
      - name: リポジトリを取得
        uses: actions/checkout@v4
      - name: Python を用意
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"
      - name: 変更差分を確認
        run: python -m ai_quality_platform.cli --config "${{ inputs.config-path }}"

