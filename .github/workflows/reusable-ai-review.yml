name: AIレビュー

on:
  workflow_call:
    secrets:
      AI_API_KEY:
        required: false
      OPENAI_API_KEY:
        required: false
      GEMINI_API_KEY:
        required: false

jobs:
  code-review:
    name: AIコードレビュー
    runs-on: ubuntu-latest
    steps:
      - name: リポジトリを取得
        uses: actions/checkout@v4
        
      - name: Python環境のセットアップ
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: プラットフォームCLIのインストール
        run: pip install -e .
        
      - name: AI品質ゲートの実行
        env:
          AI_API_KEY: ${{ secrets.AI_API_KEY || secrets.OPENAI_API_KEY || secrets.GEMINI_API_KEY }}
        run: |
          python -m ai_quality_platform.cli --config .ai-quality.yml

